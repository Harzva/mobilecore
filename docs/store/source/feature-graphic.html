<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { width: 1024px; height: 500px; margin: 0; overflow: hidden; }
      body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif; color: #13213b; background: linear-gradient(125deg, #eafff6 0%, #dff8ff 48%, #eee8ff 100%); }
      .canvas { position: relative; width: 1024px; height: 500px; padding: 58px 60px; overflow: hidden; }
      .orb { position: absolute; border-radius: 50%; filter: blur(1px); opacity: .55; }
      .orb.a { width: 310px; height: 310px; right: -70px; top: -90px; background: #b69cff; }
      .orb.b { width: 230px; height: 230px; right: 245px; bottom: -130px; background: #43d1e8; }
      .copy { position: relative; z-index: 2; width: 575px; height: 385px; }
      .brand { width: 575px; height: 92px; font-size: 72px; line-height: 92px; font-weight: 850; letter-spacing: -2px; white-space: nowrap; }
      .brand span { color: #5978ff; }
      .headline { width: 570px; height: 88px; margin-top: 10px; font-size: 32px; line-height: 44px; font-weight: 700; }
      .sub { width: 560px; height: 58px; margin-top: 15px; font-size: 19px; line-height: 29px; color: #536078; }
      .badges { display: flex; gap: 10px; width: 575px; height: 42px; margin-top: 22px; }
      .badge { height: 38px; padding: 0 15px; border: 1px solid rgba(36, 69, 118, .16); border-radius: 19px; font-size: 15px; line-height: 36px; font-weight: 700; white-space: nowrap; background: rgba(255, 255, 255, .7); }
      .device { position: absolute; z-index: 2; right: 63px; top: 52px; width: 310px; height: 396px; border: 1px solid rgba(62, 83, 126, .16); border-radius: 42px; background: rgba(255,255,255,.78); box-shadow: 0 26px 70px rgba(47, 77, 121, .20); backdrop-filter: blur(18px); }
      .device svg { display: block; width: 218px; height: 218px; margin: 16px auto -4px; }
      .score-label { width: 260px; height: 30px; margin: 0 auto; font-size: 16px; line-height: 30px; font-weight: 750; text-align: center; color: #61708a; }
      .score { width: 280px; height: 64px; margin: 0 auto; font-size: 52px; line-height: 64px; font-weight: 900; letter-spacing: -2px; text-align: center; color: #263d72; }
      .standard { width: 260px; height: 28px; margin: 2px auto 0; font-size: 17px; line-height: 28px; font-weight: 700; text-align: center; color: #58707f; }
    </style>
  </head>
  <body>
    <div class="canvas">
      <div class="orb a"></div><div class="orb b"></div>
      <section class="copy">
        <div class="brand" data-textbox="brand">TuiMa <span>推嘛</span></div>
        <div class="headline" data-textbox="headline">让大模型跑起来<br />测出手机真实 AI 性能</div>
        <div class="sub" data-textbox="sub">本地推理速度、首字响应、内存、温度与持续稳定性，一次检测全部看见。</div>
        <div class="badges">
          <div class="badge" data-textbox="badge-local">本地推理</div>
          <div class="badge" data-textbox="badge-five">五维跑分</div>
          <div class="badge" data-textbox="badge-score">双层分数</div>
        </div>
      </section>
      <aside class="device">
        <svg viewBox="0 0 108 108" aria-hidden="true">
          <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7EE6C1"/><stop offset=".5" stop-color="#43D1E8"/><stop offset="1" stop-color="#B69CFF"/></linearGradient></defs>
          <circle cx="54" cy="54" r="50" fill="url(#g)" />
          <path fill="none" stroke="#D8FFF4" stroke-linecap="round" stroke-width="5" d="M13 50h17M10 61h17" />
          <path fill="#F0FFF9" d="M27 37c-7 0-11 6-11 16 0 15 9 25 22 25 12 0 20-9 20-22s-9-19-21-19Z" />
          <path fill="#FFF" d="M25 45c0-6 6-9 13-9 8 0 14 4 14 11 0 8-7 13-15 13-7 0-12-6-12-15Z" />
          <circle cx="32" cy="48" r="2" fill="#14243F"/><circle cx="44" cy="48" r="2" fill="#14243F"/>
          <path fill="none" stroke="#14243F" stroke-linecap="round" stroke-width="2.4" d="M34 53c3 4 7 4 10 0" />
          <path fill="#FFF" d="M56 25h33q7 0 7 7v42q0 8-8 8H56q-7 0-7-7V32q0-7 7-7Z" />
          <path fill="#6B8CFF" d="M62 31h25q4 0 4 4v38q0 4-4 4H62q-4 0-4-4V35q0-4 4-4Z" />
          <path fill="none" stroke="#FFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m84 48 6 6-6 6-6-6 6-6v12" />
        </svg>
        <div class="score-label" data-textbox="score-label">TuiMa AI 跑分</div>
        <div class="score" data-textbox="score">908000</div>
        <div class="standard" data-textbox="standard">标准分 908 / 1000</div>
      </aside>
    </div>
    <script>
      const bad = [...document.querySelectorAll("[data-textbox]")].filter((el) =>
        el.scrollWidth > el.clientWidth || el.scrollHeight > el.clientHeight
      );
      document.documentElement.dataset.overflow = bad.length ? bad.map((el) => el.dataset.textbox).join(",") : "ok";
    </script>
  </body>
</html>
